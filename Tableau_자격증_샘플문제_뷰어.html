<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau 자격증 샘플 문제 · 문제해설 뷰어 by 강승일</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041; --green-border: #5DCAA5;
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-dark: #0C447C; --blue-border: #378ADD;
    --bg: #F7F7F5; --card: #FFFFFF; --border: rgba(0,0,0,0.10);
    --text: #1A1A1A; --text2: #555; --text3: #888;
    --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .app-title { font-size: 15px; font-weight: 700; color: #222; }
  .app-sub { font-size: 12px; color: var(--text3); }
  .progress-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 120px; height: 6px; background: #e5e5e5; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .3s; }
  .progress-text { font-size: 12px; color: var(--text3); white-space: nowrap; }

  .subj-tabs { display: flex; gap: 8px; padding: 14px 20px 0; }
  .subj-tab { padding: 9px 20px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; border-bottom: none; transition: all .15s; }
  .subj-tab[data-s="0"] { background: var(--green-light); color: var(--green-dark); }
  .subj-tab[data-s="1"] { background: var(--blue-light); color: var(--blue-dark); }
  .subj-tab.active[data-s="0"] { background: var(--green); color: #fff; }
  .subj-tab.active[data-s="1"] { background: var(--blue); color: #fff; }

  .num-tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 14px 20px; background: #fff; border-bottom: 1px solid var(--border); max-width: 520px; }
  .num-tab { padding: 8px 4px; border: 1px solid #ddd; border-radius: 7px; background: #fff; font-size: 12px; cursor: pointer; text-align: center; font-weight: 500; transition: all .12s; color: var(--text2); }
  .num-tab:hover { background: #f0f0f0; }
  .num-tab.answered { border-color: #bbb; background: #f5f5f5; }
  .num-tab.active[data-s="0"] { background: var(--green); color: #fff; border-color: var(--green); }
  .num-tab.active[data-s="1"] { background: var(--blue); color: #fff; border-color: var(--blue); }
  .num-tab.correct { border-color: var(--green-border) !important; background: var(--green-light) !important; color: var(--green-dark) !important; }
  .num-tab.wrong { border-color: #E24B4A !important; background: #FCEBEB !important; color: #A32D2D !important; }

  .main { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 820px) { .main { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .q-num { font-size: 12px; font-weight: 600; margin-bottom: 7px; }
  .q-text { font-size: 14.5px; font-weight: 600; line-height: 1.65; margin-bottom: 14px; color: var(--text); }
  .q-badge-multi { font-size: 10px; background: #E9A23B; color: #fff; border-radius: 4px; padding: 2px 7px; margin-left: 6px; vertical-align: middle; }

  .choice { display: flex; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; line-height: 1.55; cursor: pointer; margin-bottom: 6px; border: 1.5px solid #e5e5e5; transition: all .15s; color: var(--text2); user-select: none; }
  .choice:hover { border-color: #bbb; background: #fafafa; }
  .choice.selected { border-color: #888; background: #f0f0f0; color: var(--text); }
  .choice.correct { background: var(--green-light) !important; color: var(--green-dark) !important; border-color: var(--green-border) !important; font-weight: 600; }
  .choice.wrong-pick { background: #FCEBEB !important; color: #A32D2D !important; border-color: #E24B4A !important; }
  .choice.show-answer { background: var(--green-light); color: var(--green-dark); border-color: var(--green-border); font-weight: 600; }
  .choice-num { flex-shrink: 0; font-weight: 700; }
  .choice code { background:#eef1f4; padding:1px 5px; border-radius:4px; font-size:12px; }
  .badge { font-size: 10px; background: var(--green); color: #fff; border-radius: 4px; padding: 1px 6px; margin-left: 4px; vertical-align: middle; white-space: nowrap; }
  .badge-wrong { background: #E24B4A; }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all .15s; font-family: inherit; }
  .btn-check { background: #fff; border-color: #bbb; color: #333; }
  .btn-check:hover { background: #f5f5f5; }
  .btn-reveal { background: #fff; border-color: #bbb; color: #333; }
  .btn-reveal:hover { background: #f5f5f5; }
  .btn-next { color: #fff; border-color: transparent; }
  .btn-next[data-s="0"] { background: var(--green); } .btn-next[data-s="0"]:hover { background: var(--green-dark); }
  .btn-next[data-s="1"] { background: var(--blue); } .btn-next[data-s="1"]:hover { background: var(--blue-dark); }
  .btn-prev { background: #fff; border-color: #ddd; color: #555; }
  .btn-prev:hover { background: #f5f5f5; }
  .feedback { margin-top: 10px; font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 7px; display: none; }
  .feedback.ok { background: var(--green-light); color: var(--green-dark); display: block; }
  .feedback.ng { background: #FCEBEB; color: #A32D2D; display: block; }

  .ans-badge { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .expl-section { margin-bottom: 12px; }
  .expl-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); border-bottom: 1px solid #eee; padding-bottom: 3px; margin-bottom: 6px; }
  .expl-body { font-size: 13px; color: var(--text); line-height: 1.7; }
  .tip-box { border-radius: 0 8px 8px 0; padding: 9px 13px; font-size: 12px; line-height: 1.65; margin-top: 8px; color: var(--text2); }
  .tip-box b { color: var(--text); }
  .mini-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 6px; }
  .mini-table th { background: #f5f5f5; padding: 5px 8px; text-align: left; border-bottom: 1px solid #eee; font-weight: 600; color: #555; font-size: 11px; }
  .mini-table td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; color: var(--text); vertical-align: top; }
  .formula { background: #f7f7f5; padding: 9px 13px; border-radius: 7px; font-size: 12px; line-height: 1.75; margin-top: 6px; font-family: monospace; color: #333; }

  .mode-bar { display: flex; gap: 8px; padding: 0 20px; align-items: center; background: #fff; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .mode-btn { padding: 10px 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: transparent; border-bottom: 3px solid transparent; color: var(--text3); transition: all .15s; font-family: inherit; }
  .mode-btn.active { color: var(--text); border-bottom-color: currentColor; }
  .mode-btn.active[data-m="quiz"] { color: var(--green); }
  .mode-btn.active[data-m="study"] { color: var(--blue); }
  .mode-score { margin-left: auto; font-size: 12px; color: var(--text3); padding: 10px 0; }

  /* ── 분산형 빌더 (Q5) ── */
  .build-img { width: 100%; max-width: 460px; border: 1px solid #e3e3e3; border-radius: 8px; margin: 4px 0 12px; display: block; }
  .build-cap { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
  .shelf-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .shelf-pill { flex-shrink: 0; width: 140px; font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 7px; background: #eef1f4; color: #333; border-left: 4px solid var(--blue); }
  .shelf-pill.dim { border-left-color: #2C7A5A; }
  .shelf-pill.mea { border-left-color: #2E6FB0; }
  .shelf-arrow { color: var(--text3); font-size: 14px; }
  .shelf-sel { flex: 1; padding: 8px 10px; font-size: 13px; border: 1.5px solid #d5d5d5; border-radius: 7px; background: #fff; font-family: inherit; color: var(--text); cursor: pointer; }
  .shelf-sel:focus { outline: none; border-color: var(--blue); }
  .shelf-sel.ok { border-color: var(--green-border); background: var(--green-light); color: var(--green-dark); font-weight: 600; }
  .shelf-sel.ng { border-color: #E24B4A; background: #FCEBEB; color: #A32D2D; }
  .shelf-mark { width: 18px; flex-shrink: 0; font-weight: 700; font-size: 14px; }

  footer { background:#fff; border-top:1px solid rgba(0,0,0,.09); padding:14px 18px; text-align:center; }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="app-title">Tableau 자격증 샘플 문제 · 문제해설 뷰어</div>
    <div class="app-sub">Desktop Foundations 5문항 · Certified Data Analyst 5문항 — 문제와 정답·해설을 한 눈에</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="progress-text" id="progText">0 / 10</div>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn" data-m="quiz" onclick="setMode('quiz')">퀴즈 모드 (직접 풀기)</button>
  <button class="mode-btn active" data-m="study" onclick="setMode('study')">학습 모드 (정답+해설 바로 보기)</button>
  <div class="mode-score" id="scoreDisplay"></div>
</div>

<div id="mainView">
  <div class="subj-tabs" id="subjTabs"></div>
  <div class="num-tabs" id="numTabs"></div>
  <div class="main" id="mainPanel"></div>
</div>

   exhtml:`<table class="mini-table"><tr><th>개념</th><th>의미</th></tr><tr><td><b>Story Point</b></td><td><b>워크시트 또는 대시보드 1개 (한 시점)</b></td></tr><tr><td>Story</td><td>story point들을 순서대로 엮은 내러티브</td></tr></table>`},

  // ───────── Tableau Certified Data Analyst (si:1) ─────────
  {si:1,n:1,
   q:"In Tableau Prep Builder, which feature lets you automatically fix inconsistent values like 'CA', 'Calif', and 'California' into a single value?",
   cs:["Pivot Columns to Rows",
       "Filter by Range",
       "Group Values (using Pronunciation or Common Characters)",
       "Custom Split"],
   a:2,
   why:"Prep Builder의 Group Values(값 그룹화) 기능이 발음(Pronunciation)·공통 문자(Common Characters)·맞춤법 기준으로 유사한 값을 자동으로 하나로 묶어준다. Pivot·Filter·Split은 값 표준화와 무관하다.",
   tip:"비슷한 값 자동 표준화 = Group Values(그룹화). 머신러닝 클러스터링과 혼동 금지!",
   exhtml:`<table class="mini-table"><tr><th>기능</th><th>역할</th></tr><tr><td><b>Group Values</b></td><td><b>유사 값 자동 묶기 → 정답</b></td></tr><tr><td>Pivot</td><td>열↔행 구조 변환</td></tr><tr><td>Custom Split</td><td>구분자로 필드 분리</td></tr></table>`},
  {si:1,n:2,
   q:"A view shows Quarterly Sales over several years. To compare the current quarter's sales to the same quarter in the previous year using LOOKUP, what should the offset (index) value be?",
   cs:["0", "1", "-4", "-1"],
   a:2,
   why:"분기 데이터에서 전년 동일 분기는 4분기 전이므로 LOOKUP의 offset은 -4. (양수는 미래, -1은 직전 분기, -12는 월 데이터에서의 전년 동월)",
   tip:"전년 '동기'(분기) = 4칸 전 = -4. 월 데이터면 -12!",
   exhtml:`<div class="formula">LOOKUP(SUM([Sales]), -4)<br><br>2024 Q3  ←(-4)─  2023 Q3 (전년 동분기)<br>분기 단위 1년 = 4칸</div>`},
  {si:1,n:3,
   q:"You need to identify the top customers who contribute to 80% of total sales in a specific region. Which analytical tool is most appropriate?",
   cs:["Clustering", "Trend Lines", "Box Plot", "Pareto Chart"],
   a:3,
   why:"누적 기여 80%를 차지하는 상위 고객 식별은 파레토 차트(Pareto, 80/20 법칙)가 정석이다. 막대(개별 기여)와 누적 비율 곡선을 결합해 80% 지점을 한눈에 본다.",
   tip:"'80% 기여 상위' = 파레토. 군집(클러스터링)·추세선과 혼동 금지!",
   exhtml:`<div class="expl-body">파레토 법칙(80/20): 결과의 80%는 상위 20% 원인에서 발생.<br>예) 매출 80% ← 상위 20% 고객<br><br>→ 막대(내림차순) + 누적% 곡선으로 80% 지점 식별</div>`},
  {si:1,n:4,
   q:"You want to calculate a Year-to-Date (YTD) total but exclude the current month's data. Which logical expression correctly filters for this?",
   cs:["YEAR([Date]) == YEAR(TODAY()) - 1",
       "DATETRUNC('year',[Date]) = DATETRUNC('year', TODAY())",
       "DATEDIFF('month',[Date],TODAY()) > 0 AND DATEDIFF('year',[Date],TODAY()) = 0",
       "[Date] < TODAY()"],
   a:2,
   why:"올해이면서(연 차이=0) 현재 월보다 이전(월 차이>0)인 두 조건을 모두 만족해야 '올해+이번 달 제외 YTD'가 된다. ①은 전년, ②는 이번 달 포함 올해 전체, ④는 과거 전체라 범위가 틀리다.",
   tip:"올해(year diff=0) + 이번 달 제외(month diff>0) — 두 조건 AND가 핵심!",
   exhtml:`<div class="formula">DATEDIFF('year',[Date],TODAY()) = 0   ← 올해<br>AND<br>DATEDIFF('month',[Date],TODAY()) > 0  ← 이번 달 제외</div>`},
  {si:1,n:5, type:"build",
   q:"아래 분산형 차트(Scatter Plot)를 만들려면 각 필드를 어느 선반(Shelf)·마크에 올려야 할까요? 드롭다운으로 선택하세요.",
   fields:[
     {name:"Sales",         kind:"mea", correct:"Columns (열)"},
     {name:"Profit",        kind:"mea", correct:"Rows (행)"},
     {name:"Customer Name", kind:"dim", correct:"Detail (세부 정보)"},
     {name:"Category",      kind:"dim", correct:"Color (색상)"},
   ],
   why:"분산형 차트는 두 측정값을 각각 축에 둔다. Sales→열(Columns·X축), Profit→행(Rows·Y축). 점을 고객 단위로 분리하려면 Customer Name→세부 정보(Detail), 범주를 색으로 구분하려면 Category→색상(Color).",
   tip:"분산형 = 측정값 2개를 행·열 축에 / 점 분리는 Detail / 범주 구분은 Color!",
   exhtml:`<table class="mini-table"><tr><th>필드</th><th>선반/마크</th><th>역할</th></tr><tr><td>Sales (측정값)</td><td><b>Columns (열)</b></td><td>X축</td></tr><tr><td>Profit (측정값)</td><td><b>Rows (행)</b></td><td>Y축</td></tr><tr><td>Customer Name (차원)</td><td><b>Detail (세부 정보)</b></td><td>고객별 점 분리</td></tr><tr><td>Category (차원)</td><td><b>Color (색상)</b></td><td>범주 색 구분</td></tr></table>`},
];

const SHELF_OPTS = ["선택하세요","Columns (열)","Rows (행)","Color (색상)","Detail (세부 정보)","Size (크기)","Label (레이블)"];

// ── 상태 ──
let mode = 'study';
let curSubj = 0;
let curIdx = 0;
const TOTAL = ALL_Q.length;
let userAns = ALL_Q.map(q => q.multi ? [] : -1);
let userBuild = ALL_Q.map(q => q.type === 'build' ? {} : null);
let revealed = ALL_Q.map(() => false);

const MARKS = ['①','②','③','④','⑤'];
function gi_(si, li){ return si*5 + li; }

function buildSubjTabs(){
  document.getElementById('subjTabs').innerHTML = SUBJECTS.map((s,i)=>
    `<button class="subj-tab ${i===curSubj?'active':''}" data-s="${i}" onclick="switchSubj(${i})">${s.name}</button>`).join('');
}

function buildNumTabs(){
  const start = curSubj*5;
  document.getElementById('numTabs').innerHTML = Array.from({length:5},(_,i)=>{
    const gi = start+i; const q = ALL_Q[gi];
    let cls='';
    if(i===curIdx) cls='active';
    else if(mode==='quiz' && revealed[gi]){
      cls = isCorrect(gi) ? 'correct' : 'wrong';
    } else if(mode==='study'){ cls='answered'; }
    return `<button class="num-tab ${cls}" data-s="${curSubj}" onclick="switchQ(${i})">${q.n}</button>`;
  }).join('');
}

function isCorrect(gi){
  const q = ALL_Q[gi];
  if(q.type==='build'){
    const b = userBuild[gi]||{};
    return q.fields.every(f => b[f.name]===f.correct);
  }
  if(q.multi){
    const sel = [...userAns[gi]].sort().join(',');
    const cor = [...q.a].sort().join(',');
    return sel===cor && sel.length>0;
  }
  return userAns[gi]===q.a;
}

function answeredCount(){
  let c=0;
  ALL_Q.forEach((q,gi)=>{
    if(q.type==='build'){ if(Object.keys(userBuild[gi]||{}).some(k=>userBuild[gi][k] && userBuild[gi][k]!=='선택하세요')) c++; }
    else if(q.multi){ if(userAns[gi].length>0) c++; }
    else if(userAns[gi]!==-1) c++;
  });
  return c;
}

function updateProgress(){
  const a = answeredCount();
  document.getElementById('progFill').style.width = (a/TOTAL*100)+'%';
  document.getElementById('progText').textContent = `${a} / ${TOTAL}`;
  if(mode==='quiz'){
    let cor=0; ALL_Q.forEach((q,gi)=>{ if(revealed[gi] && isCorrect(gi)) cor++; });
    document.getElementById('scoreDisplay').textContent = `정답 ${cor}개 / 채점 ${revealed.filter(Boolean).length}개`;
  } else {
    document.getElementById('scoreDisplay').textContent = '학습 모드 — 정답·해설 바로 확인';
  }
}

function renderChoices(gi, q, submitted){
  const picked = userAns[gi];
  return q.cs.map((c,ci)=>{
    let cls='choice'; let isPick = q.multi ? picked.includes(ci) : picked===ci;
    const isAns = q.multi ? q.a.includes(ci) : q.a===ci;
    if(submitted){
      if(isAns) cls += ' show-answer';
      else if(isPick && !isAns) cls += ' wrong-pick';
    } else if(isPick){ cls += ' selected'; }
    const click = (!submitted) ? `onclick="pickChoice(${ci})"` : '';
    const okBadge = submitted && isAns ? '<span class="badge">정답</span>' : '';
    const ngBadge = submitted && isPick && !isAns ? '<span class="badge badge-wrong">선택</span>' : '';
    return `<div class="${cls}" ${click}><span class="choice-num">${MARKS[ci]}</span><span>${c}${okBadge}${ngBadge}</span></div>`;
  }).join('');
}

function renderBuild(gi, q, submitted){
  const b = userBuild[gi]||{};
  let rows = q.fields.map(f=>{
    const attempted = b[f.name] && b[f.name]!=='선택하세요';
    // 학습 모드에서 사용자가 고르지 않았으면 정답을 채워서 보여준다
    let val = b[f.name] || '선택하세요';
    if(submitted && !attempted && mode==='study') val = f.correct;
    let selCls='shelf-sel', mark='';
    if(submitted){
      if(val===f.correct){ selCls+=' ok'; mark='<span class="shelf-mark" style="color:var(--green)">✓</span>'; }
      else { selCls+=' ng'; mark='<span class="shelf-mark" style="color:#E24B4A">✗</span>'; }
    } else { mark='<span class="shelf-mark"></span>'; }
    const opts = SHELF_OPTS.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('');
    const dis = submitted ? 'disabled' : '';
    const kindLabel = f.kind==='mea' ? '측정값' : '차원';
    return `<div class="shelf-row">
      <span class="shelf-pill ${f.kind}">${f.name}<span style="font-weight:400;font-size:11px;color:#888"> · ${kindLabel}</span></span>
      <span class="shelf-arrow">▶</span>
      <select class="${selCls}" ${dis} onchange="setBuild('${f.name}', this.value)">${opts}</select>
      ${mark}</div>`;
  }).join('');
  const cap = `<img class="build-img" src="${DA_IMG}" alt="목표 분산형 차트">
    <div class="build-cap">▲ 목표 화면: Sales(X) × Profit(Y) 분산형, 점은 고객별, 색은 Category 구분 — 이 화면을 만들려면?</div>`;
  return cap + rows;
}

function renderPanel(){
  const gi = gi_(curSubj, curIdx);
  const q = ALL_Q[gi];
  const subj = SUBJECTS[curSubj];
  const submitted = revealed[gi] || mode==='study';

  let bodyHTML, btnHTML='';
  if(q.type==='build'){
    bodyHTML = renderBuild(gi, q, submitted);
    if(mode==='quiz' && !submitted){
      btnHTML = `<button class="btn btn-check" onclick="checkAnswer()">확인하기</button>
                 <button class="btn btn-reveal" onclick="revealAnswer()">정답 보기</button>`;
    }
  } else {
    bodyHTML = renderChoices(gi, q, submitted);
    if(mode==='quiz' && !submitted){
      btnHTML = `<button class="btn btn-check" onclick="checkAnswer()">채점하기</button>
                 <button class="btn btn-reveal" onclick="revealAnswer()">정답 보기</button>`;
    }
  }
  btnHTML += `<button class="btn btn-prev" onclick="prevQ()">◀ 이전</button>
              <button class="btn btn-next" data-s="${curSubj}" onclick="nextQ()">다음 ▶</button>`;

  let feedbackHTML='';
  if(submitted && mode==='quiz'){
    const ok = isCorrect(gi);
    feedbackHTML = `<div class="feedback ${ok?'ok':'ng'}">${ok?'✓ 정답입니다!':'✗ 다시 확인해 보세요. 오른쪽 해설을 참고하세요.'}</div>`;
  }

  const multiBadge = q.multi ? '<span class="q-badge-multi">정답 3개</span>' : '';
  let ansLabel='';
  if(submitted){
    if(q.type==='build') ansLabel = '정답 매핑';
    else if(q.multi) ansLabel = q.a.map(i=>MARKS[i]).join(' ');
    else ansLabel = MARKS[q.a];
  }

  document.getElementById('mainPanel').innerHTML = `
    <div class="card">
      <div class="card-label">문제</div>
      <div class="q-num" style="color:${subj.color}">${subj.short} · ${q.n}번${multiBadge}</div>
      <div class="q-text">${q.q}</div>
      ${bodyHTML}
      ${feedbackHTML}
      <div class="btn-row">${btnHTML}</div>
    </div>
    <div class="card">
      <div class="card-label">정답 · 해설</div>
      ${submitted ? `
        <div class="ans-badge" style="color:${subj.color}">${ansLabel} ${q.type==='build'?'':'정답'}</div>
        <div class="expl-section"><div class="expl-title">해설</div><div class="expl-body">${q.why}</div></div>
        ${q.exhtml||''}
        <div class="tip-box" style="background:${subj.light};border-left:3px solid ${subj.color}"><b>암기 팁</b> &nbsp;${q.tip}</div>
      ` : `
        <div style="text-align:center;padding:48px 0;color:var(--text3)">
          <div style="font-size:30px;margin-bottom:10px">🧩</div>
          <div style="font-size:13px">문제를 풀거나 '정답 보기'를 누르면<br>해설이 나타납니다.</div>
        </div>`}
    </div>`;

  buildNumTabs();
  updateProgress();
}

function switchSubj(si){ curSubj=si; curIdx=0; buildSubjTabs(); renderPanel(); }
function switchQ(li){ curIdx=li; renderPanel(); }

function pickChoice(ci){
  const gi = gi_(curSubj, curIdx);
  if(revealed[gi]) return;
  const q = ALL_Q[gi];
  if(q.multi){
    const arr = userAns[gi]; const k = arr.indexOf(ci);
    if(k>=0) arr.splice(k,1); else arr.push(ci);
  } else {
    userAns[gi] = (userAns[gi]===ci) ? -1 : ci;
  }
  renderPanel();
}

function setBuild(field, val){
  const gi = gi_(curSubj, curIdx);
  if(!userBuild[gi]) userBuild[gi]={};
  userBuild[gi][field] = val;
  updateProgress();
}

function checkAnswer(){
  const gi = gi_(curSubj, curIdx);
  const q = ALL_Q[gi];
  if(q.type==='build'){
    const b = userBuild[gi]||{};
    if(q.fields.some(f=>!b[f.name] || b[f.name]==='선택하세요')){ alert('네 필드를 모두 선택해 주세요.'); return; }
  } else if(q.multi){
    if(userAns[gi].length===0){ alert('선택지를 선택해 주세요.'); return; }
  } else if(userAns[gi]===-1){ alert('선택지를 먼저 선택해 주세요.'); return; }
  revealed[gi]=true; renderPanel();
}
function revealAnswer(){ const gi=gi_(curSubj,curIdx); revealed[gi]=true; renderPanel(); }

function nextQ(){
  if(curIdx<4){ curIdx++; renderPanel(); }
  else if(curSubj<1){ curSubj++; curIdx=0; buildSubjTabs(); renderPanel(); }
}
function prevQ(){
  if(curIdx>0){ curIdx--; renderPanel(); }
  else if(curSubj>0){ curSubj--; curIdx=4; buildSubjTabs(); renderPanel(); }
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.m===m));
  if(m==='study'){ revealed = revealed.map(()=>true); }
  buildSubjTabs(); renderPanel();
}

buildSubjTabs();
renderPanel();
</script>
